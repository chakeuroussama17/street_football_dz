name: Build APK

# Runs on every push to main, and can be triggered by hand from the
# Actions tab (Run workflow). Produces a downloadable APK artifact.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      # .env is gitignored, so recreate it for the build. The anon key is a
      # PUBLIC client key (RLS protects the data), so it's safe here. You can
      # override these by adding repo Secrets named SUPABASE_URL / SUPABASE_ANON_KEY.
      - name: Create .env
        run: |
          echo "SUPABASE_URL=${SUPABASE_URL:-https://qwjevsuoiiswfhbhrbei.supabase.co}" > .env
          echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3amV2c3VvaWlzd2ZoYmhyYmVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwODIwMjcsImV4cCI6MjA5NzY1ODAyN30.oC43qTdqA0s2ZsEmXnM4SGs_tSGPk764-V4IJD2M0-w}" >> .env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: street-football-dz-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
