<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Build your team, challenge the neighbourhood, climb the Algerian league.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Street Football DZ">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Street Football DZ</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- TEMP diagnostic: surfaces any startup error on-screen (remove later). -->
  <div id="err" style="position:fixed;inset:0;z-index:99999;background:#0b0b0b;color:#39ff14;font:12px/1.5 monospace;padding:16px;white-space:pre-wrap;overflow:auto;display:none"></div>
  <script>
    (function () {
      var box = document.getElementById('err');
      function show(m) { box.style.display = 'block'; box.textContent += m + "\n\n"; }
      window.addEventListener('error', function (e) {
        show('JS ERROR: ' + (e.message || '') + "\n" + ((e.error && e.error.stack) || ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason; show('PROMISE REJECTION: ' + ((r && (r.stack || r.message)) || r));
      });
      var ce = console.error;
      console.error = function () {
        try { show('CONSOLE: ' + Array.prototype.join.call(arguments, ' ')); } catch (_) {}
        ce.apply(console, arguments);
      };
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
