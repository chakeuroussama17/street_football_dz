name: street_football_dz
description: "Street Football DZ — team-based street football matchmaking for Algeria."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.0.0
  go_router: ^13.0.0
  flutter_riverpod: ^2.6.0
  google_fonts: ^6.0.0
  flutter_animate: ^4.0.0
  cached_network_image: ^3.0.0
  image_picker: ^1.0.0
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.2.0
  shared_preferences: ^2.3.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Generates the Android/iOS launcher icons from assets/images/logo.png.
  # Regenerate after changing the logo: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

# App launcher icon (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0A0E0C"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  # Generates the localization classes (AppLocalizations) from the ARB files
  # in lib/l10n (see l10n.yaml).
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/images/
